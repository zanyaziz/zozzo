name: Deploy to server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rsync files
        env:
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete --exclude='.git' --exclude='node_modules' --exclude='*.log' ./ ${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_PATH}

# To enable: add secrets SSH_PRIVATE_KEY (private key), DEPLOY_USER, DEPLOY_HOST, DEPLOY_PATH in repo settings.
